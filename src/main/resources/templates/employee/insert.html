<!DOCTYPE html>
<html
        lang="ja"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>従業員管理システム</title>
    <link
            rel="stylesheet"
            href="../../static/css/bootstrap.css"
            th:href="@{/css/bootstrap.css}"
    />
    <link
            rel="stylesheet"
            href="../../static/css/style.css"
            th:href="@{/css/style.css}"
    />
    <!--[if lt IE 9]>
    <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
    <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
</head>
<body>
<div class="container">
    <nav class="navbar navbar-default">
        <div class="container-fluid">
            <!-- Brand and toggle get grouped for better mobile display -->
            <div class="navbar-header">
                <button
                        type="button"
                        class="navbar-toggle collapsed"
                        data-toggle="collapse"
                        data-target="#bs-example-navbar-collapse-1"
                        aria-expanded="false"
                >
                    <span class="sr-only">Toggle navigation</span>
                    <span class="icon-bar"></span> <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a
                        class="navbar-brand"
                        href="list.html"
                        th:href="@{/employee/showList}"
                >
                    <!-- 企業ロゴ -->
                    <img
                            src="../../static/img/header_logo_small.png"
                            th:src="@{/img/header_logo_small.png}"
                    />
                </a>
            </div>

            <!-- Collect the nav links, forms, and other content for toggling -->
            <div
                    class="collapse navbar-collapse"
                    id="bs-example-navbar-collapse-1"
            >
                <ul class="nav navbar-nav">
                    <li class="active">
                        <a href="list.html" th:href="@{/employee/showList}"
                        >従業員管理</a
                        >
                    </li>
                    <li class="active">
                        <a href="insert.html" th:href="@{/employee/toInsert}"
                        >従業員追加</a
                        >
                    </li>
                </ul>
                <p class="navbar-text navbar-right">
              <span th:text="${session.administratorName}">山田太郎</span
              >さんこんにちは！ &nbsp;&nbsp;&nbsp;
                    <a
                            href="../administrator/login.html"
                            class="navbar-link"
                            th:href="@{/logout}"
                    >ログアウト</a
                    >
                </p>
                <form th:action="@{/employee/search}" method="post">
                    <input type="text"
                           name="name"
                           id="name"
                           class="form-control"
                           th:value="*{name}"
                    />
                    <button type="submit" class="btn btn-primary">
                        従業員検索
                    </button>
                </form>
            </div>
            <!-- /.navbar-collapse -->
        </div>
        <!-- /.container-fluid -->
    </nav>

    <!-- パンくずリスト -->
    <ol class="breadcrumb">
        <li class="active">
            <a href="list.html" th:href="@{/employee/showList}">従業員リスト</a>
        </li>
    </ol>

    <h3>従業員登録</h3>
    <form th:action="@{/employee/insert}" method="post" th:object="${insertEmployeeForm}" enctype="multipart/form-data">

                従業員名
                <div class="error-messages" th:errors="*{name}">
                    エラー
                </div>
                <label
                        class="control-label"
                        style="color: red"
                        for="name"
                ></label>
                <input
                        type="text"
                        class="form-control"
                        th:field="*{name}"
                /><br>
                写真
                <div class="error-messages" th:errors="*{image}">
                    エラー
                </div>
                <input type="file" name = "image" th:field="*{image}" class="form-control"/><br>
                <label
                        class="control-label"
                        style="color: red"
                        for="male"
                ></label>
                <label>
                    <input
                            type="radio"
                            name="gender"
                            id="male"
                            th:value="男性"
                            checked
                    />男性
                </label>
                <label
                        class="control-label"
                        style="color: red"
                        for="female"
                ></label>
                <label>
                    <input
                            type="radio"
                            name="gender"
                            id="female"
                            th:value="女性"
                    />女性
                </label><br>
                入社日
                <div class="error-messages" th:errors="*{hireDate}">
                    エラー
                </div>
                <input
                        type="date"
                        name="hireDate"
                        class="form-control"
                        id="hireDate"
                        th:field="*{hireDate}"
                /><br>
                メールアドレス
                <div class="error-messages" th:errors="*{mailAddress}">
                    エラー
                </div>
                <input
                        type="email"
                        name="mailAddress"
                        id="mailAddress"
                        class="form-control"
                        th:field="*{mailAddress}"
                /><br>
                郵便番号
                <div class="error-messages" th:errors="*{zipCode}">
                    エラー
                </div>
                <label
                        class="control-label"
                        style="color: red"
                        for="zipCode"
                ></label>
                <input
                        type="text"
                        name="zipCode"
                        id="zipCode"
                        class="form-control"
                        th:field="*{zipCode}"
                        onblur="fetchAddressByZip()"
                /><br>
                住所
                <div class="error-messages" th:errors="*{address}">
                    エラー
                </div>
                <label
                        class="control-label"
                        style="color: red"
                        for="address"
                ></label>
                <input
                        type="text"
                        name="address"
                        id="address"
                        class="form-control"
                        th:field="*{address}"
                /><br>
                電話番号
                <div class="error-messages" th:errors="*{telephone}">
                    エラー
                </div>
                <label
                        class="control-label"
                        style="color: red"
                        for="telephone"
                ></label>
                <input
                        type="text"
                        name="telephone"
                        id="telephone"
                        class="form-control"
                        th:field="*{telephone}"
                /><br>
                給料
                <div class="error-messages" th:errors="*{salary}">
                    エラー
                </div>
                <label
                        class="control-label"
                        style="color: red"
                        for="salary"
                ></label>
                <input
                        type="text"
                        name="salary"
                        id="salary"
                        class="form-control"
                        th:value="*{salary}"
                /><br>
                特性
                <div class="error-messages" th:errors="*{characteristics}">
                    エラー
                </div>
                <label
                        class="control-label"
                        style="color: red"
                        for="characteristics"
                ></label>
                <input
                        type="text"
                        name="characteristics"
                        id="characteristics"
                        class="form-control"
                        th:field="*{characteristics}"
                /><br>
                扶養人数
                <div class="error-messages" th:errors="*{dependentsCount}">
                    エラー
                </div>
                <label
                        class="control-label"
                        style="color: red"
                        for="dependentsCount"
                ></label>
                <input
                        type="text"
                        name="dependentsCount"
                        id="dependentsCount"
                        class="form-control"
                        th:value="*{dependentsCount}"
                />
                <button type="submit" class="btn btn-primary">追加</button>
            </form>
            <!-- ここから下を編集する必要はありません -->
        </div>
    </div>
</div>
<!-- end container -->

<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
<script src="/js/employee.js"></script>
<script src="/js/bootstrap.min.js"></script>
</body>
</html>
